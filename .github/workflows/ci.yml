name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest   # NFR-01 측정 기준선 / FR-02 AC1
    strategy:
      matrix:
        python-version: ["3.11"]   # FR-02 AC2 / NFR-07
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 이슈 #106: soffice->PDF->PNG 통합 스모크(FR-30)가 CI 에서 실제 실행되도록
      # LibreOffice(headless 변환 가능) 를 설치한다.
      - name: Install LibreOffice (soffice)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libreoffice
          soffice --version

      - name: Install (editable + dev + render extras)
        run: |
          python -m pip install --upgrade pip
          pip install hatch
          pip install -e .[dev,render]

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Mypy (type check)
        run: mypy src/

      - name: Pytest
        run: pytest
